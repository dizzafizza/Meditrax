name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        env:
          # Set this in: GitHub repo -> Settings -> Secrets and variables -> Actions -> Variables
          # Value = your deployed Emergent backend URL, e.g. https://meditrax.emergent.host
          REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL }}
          CI: "false"
        run: yarn build

      - name: Add SPA 404 fallback
        run: cp build/index.html build/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
