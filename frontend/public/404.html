<!doctype html>
<html>

    <meta charset="utf-8" />
    <title>Meditrax</title>
    <script>
      // GitHub Pages SPA fallback: remember the requested URL, then load the app.
      sessionStorage.redirect = location.href;
      location.replace(location.origin + location.pathname.split("/").slice(0, 1).join("/") + "/");
    </script>
  </head>

</html>
